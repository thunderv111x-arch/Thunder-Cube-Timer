<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Rubik's Cube Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#05050f">
<meta name="description" content="ตัวจับเวลาลูกบาศก์รูบิค พร้อม scramble, สถิติ, session และรองรับ GAN Smart Timer">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cube Timer">

<style>
  :root{
    --bg:#05050f;
    --panel:rgba(30,24,58,0.55);
    --panel-solid:#181233;
    --accent:#00e5ff;
    --accent2:#ffc857;
    --danger:#ff5f8f;
    --purple:#a78bfa;
    --text:#e9e8ff;
    --muted:#8f8cba;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Tahoma, sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(167,139,250,0.25), transparent 60%),
      radial-gradient(ellipse 800px 600px at 110% 10%, rgba(0,229,255,0.15), transparent 55%),
      radial-gradient(ellipse at top, #1b1035 0%, #05050f 55%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    user-select:none;
    position:relative;
    overflow-x:hidden;
    transition: background 0.3s, color 0.3s;
  }
  
  /* --- Themes CSS --- */
  body.theme-amoled {
    --bg:#000000;
    --panel:rgba(20,20,20,0.8);
    --panel-solid:#151515;
    --accent:#ffffff;
    --accent2:#00e5ff;
    --danger:#ff3b30;
    --purple:#8e8e93;
    --text:#ffffff;
    --muted:#8e8e93;
    background: #000000;
  }
  body.theme-light {
    --bg:#f4f5f6;
    --panel:rgba(255,255,255,0.85);
    --panel-solid:#ffffff;
    --accent:#007aff;
    --accent2:#e0a900;
    --danger:#ff3b30;
    --purple:#5856d6;
    --text:#1c1c1e;
    --muted:#8e8e93;
    background: #f4f5f6;
  }
  body.theme-cyberpunk {
    --bg:#000511;
    --panel:rgba(0,10,24,0.7);
    --panel-solid:#001533;
    --accent:#00ffcc;
    --accent2:#fffb00;
    --danger:#ff0077;
    --purple:#cc00ff;
    --text:#00ffcc;
    --muted:#00aaff;
    background: radial-gradient(circle at center, #001026 0%, #000511 100%), #000511;
  }

  body::before, body::after{
    content:"";
    position:fixed;
    top:0;
    left:0; right:0; bottom:0;
    pointer-events:none;
    background-repeat:repeat;
    z-index:0;
  }
  body::before{
    background-image:
      radial-gradient(1.6px 1.6px at 20px 30px, #fff, transparent),
      radial-gradient(1px 1px at 90px 120px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 160px 60px, #fff, transparent),
      radial-gradient(1px 1px at 210px 180px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 250px 20px, #fff, transparent),
      radial-gradient(1px 1px at 300px 150px, #fff, transparent);
    background-size:340px 240px;
    opacity:.55;
    animation:twinkle 4s ease-in-out infinite alternate;
  }
  body::after{
    background-image:
      radial-gradient(1px 1px at 40px 90px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 130px 40px, #fff, transparent),
      radial-gradient(1px 1px at 190px 140px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 270px 100px, #fff, transparent),
      radial-gradient(1px 1px at 320px 200px, #fff, transparent);
    background-size:360px 260px;
    opacity:.35;
    animation:twinkle 6s ease-in-out infinite alternate-reverse;
  }
  body.theme-amoled::before, body.theme-amoled::after,
  body.theme-light::before, body.theme-light::after {
    display: none;
  }
  
  @keyframes twinkle{
    0%{opacity:.2;}
    100%{opacity:.7;}
  }
  body > *{
    position:relative;
    z-index:1;
  }
  h1{
    font-size:22px;
    color:var(--text);
    letter-spacing:1px;
    margin-bottom:4px;
    text-shadow:0 0 12px rgba(0,229,255,0.6), 0 0 24px rgba(167,139,250,0.4);
    text-align: center;
  }
  #scramble{
    font-size:22px;
    font-weight:600;
    letter-spacing:2px;
    background:var(--panel);
    backdrop-filter:blur(6px);
    border:1px solid rgba(0,229,255,0.25);
    box-shadow:0 0 20px rgba(0,229,255,0.08), inset 0 0 20px rgba(167,139,250,0.06);
    padding:14px 24px;
    border-radius:12px;
    margin:12px 0 30px;
    text-align:center;
    max-width:700px;
  }
  #timerDisplay{
    font-size:96px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    transition:color .15s, text-shadow .15s;
    margin:10px 0 30px;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    touch-action:manipulation;
    padding:20px 40px;
    border-radius:20px;
    cursor:pointer;
    text-shadow:0 0 18px rgba(233,232,255,0.25);
  }

      padding:16px 24px;
    }

  .inspecting{color:var(--purple) !important; text-shadow:0 0 24px rgba(167,139,250,0.7) !important;}

  .inspect-danger{color:var(--danger) !important; text-shadow:0 0 24px rgba(255,95,143,0.7) !important;}
  .penalty{color:var(--accent2) !important;}

  #configBar input, #configBar select{

    color: var(--text);
    border: 1px solid rgba(167,139,250,0.35);

    border-radius: 6px;

  #hint{

    text-align: center;
  }
  .stats{

    gap:14px;
    flex-wrap:wrap;
    justify-content:center;

  }
  .stat-box{

  #btStatus{

  #cubeTypeBar select{

    color:var(--text);

  #cubeTypeBar select:hover{border-color:var(--accent);}
  #cubeNetWrap{

  #cubeNetWrap svg{

    margin-right:4px;

  .time-row{
    display:block;
    padding:6px 0;
    border-bottom:1px solid rgba(167,139,250,0.15);
    font-size:14px;
    font-variant-numeric:tabular-nums;

  }
  .time-row .row-main{
    display:flex;
    justify-content:space-between;
  }
  .time-row .row-scramble{
    display:none;

    font-weight:700;
  }
  .best-star{
    margin-right:6px;
    filter:drop-shadow(0 0 4px rgba(255,200,87,0.6));
  }
</style>

<body>

<h1>🪐 RUBIK'S CUBE TIMER — SPACE EDITION 🚀</h1>

<script>
// ---------- Scramble generator ----------
const FACES = ['U','D','L','R','F','B'];
const MODS = ['', "'", '2'];
const OPPOSITE = {U:'D',D:'U',L:'R',R:'L',F:'B',B:'F'};

function generateScramble(len=20){
  let moves = [];
  let last = '', lastAxis = '';
  for(let i=0;i<len;i++){
    let face;
    do {
      face = FACES[Math.floor(Math.random()*FACES.length)];
    } while(face === last || (OPPOSITE[face] === last && face === lastAxis));
    lastAxis = last;
    last = face;
    const mod = MODS[Math.floor(Math.random()*MODS.length)];
    moves.push(face+mod);
  }
  return moves.join(' ');
}

// ---------- Generators for other cube types ----------
function generateSimpleScramble(faces, mods, len){
  let moves = [];
  let last = '';
  for(let i=0;i<len;i++){
    let face;
    do {
      face = faces[Math.floor(Math.random()*faces.length)];
    } while(face === last);
    last = face;
    const mod = mods[Math.floor(Math.random()*mods.length)];
    moves.push(face+mod);
  }
  return moves.join(' ');
}

function generateWideScramble(len){
  const faces = ['U','D','L','R','F','B'];
  const AXIS = {U:'UD',D:'UD',L:'LR',R:'LR',F:'FB',B:'FB'};
  const mods = ['', "'", '2'];
  let moves = [];
  let lastAxis = '';
  for(let i=0;i<len;i++){
    let base;
    do {
      base = faces[Math.floor(Math.random()*faces.length)];
    } while(AXIS[base] === lastAxis);
    lastAxis = AXIS[base];
    const wide = Math.random() < 0.5;
    const mod = mods[Math.floor(Math.random()*mods.length)];
    moves.push(base + (wide ? 'w' : '') + mod);
  }
  return moves.join(' ');
}

function generatePyraminxScramble(){
  const faces = ['U','L','R','B'];
  const mods = ['', "'"];
  let moves = generateSimpleScramble(faces, mods, 10).split(' ');
  ['u','l','r','b'].forEach(tip => {
    if(Math.random() < 0.7){
      const mod = mods[Math.floor(Math.random()*mods.length)];
      moves.push(tip+mod);
    }
  });
  return moves.join(' ');
}

// ข้อมูลสำหรับฝึกส้อม OLL, PLL, F2L
const OLL_CASES = [
  "R U2 R2 F R F' U2 R' F R F'", "F R U R' U' F'", "f R U R' U' f'", "f R U R' U' f' U' F R U R' U' F'",
  "r U R' U' r' F R F'", "F' L' U' L U F", "f' L' U' L U f", "f' L' U' L U f U F' L' U' L U F"
];
const PLL_CASES = [
  "R' U L' U2 R U' R' U2 R L", "R U R' F' R U R' U' R' F R2 U' R'", "x R2 D2 R U R' D2 R U' R",
  "R U' R U R U R U' R' U' R2", "M2 U M2 U2 M2 U M2", "R' U' R U' R U R U' R' U R U R2 U' R'"
];
const F2L_CASES = [
  "R U R' U' R U R'", "R U' R' U R U' R'", "R U2 R' U' R U R'", "R U' R' U2 R U' R'"
];
const SCRAMBLERS = {
  '2x2': () => generateSimpleScramble(['U','R','F'], ['', "'", '2'], 9),
  '3x3': () => generateScramble(20),
  '3x3_f2l': () => "F2L: " + F2L_CASES[Math.floor(Math.random() * F2L_CASES.length)],
  '3x3_oll': () => "OLL: " + OLL_CASES[Math.floor(Math.random() * OLL_CASES.length)],
  '3x3_pll': () => "PLL: " + PLL_CASES[Math.floor(Math.random() * PLL_CASES.length)],

function composePerm(p1, p2){
  const out = new Array(54);
  for(let i=0;i<54;i++) out[i] = p2[p1[i]];
  return out;
}
function invertPerm(p){
  const out = new Array(54);
  for(let i=0;i<54;i++) out[p[i]] = i;
  return out;
}
function getMovePerm(move){
  const face = move[0];
  const mod = move.slice(1);
  const base = CUBE_BASE_MOVES[face];
  if(mod === "'") return invertPerm(base);
  if(mod === '2') return composePerm(base, base);
  return base;
}
function applyPerm(stateArr, perm){
  const out = new Array(54);
  for(let i=0;i<54;i++) out[perm[i]] = stateArr[i];
  return out;
}
function solvedFacelets(){
  const order = ['U','R','F','D','L','B'];
  let arr = [];
  order.forEach(f => { for(let i=0;i<9;i++) arr.push(f); });
  return arr;
}
function scrambleToFacelets(scrambleStr){
  let s = solvedFacelets();
  scrambleStr.trim().split(/\s+/).forEach(mv => {
    if(!mv || mv.includes(':')) return; 
    s = applyPerm(s, getMovePerm(mv));
  });
  return s;
}

// ---------- Seeded PRNG ----------
function hashSeed(str){
  let h = 1779033703 ^ str.length;
  for(let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h>>>16), 2246822507);
    h = Math.imul(h ^ (h>>>13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  };
}

}

// NxN Net Builder (4x4, 5x5) using Seeded PRNG for illustrative colors
function renderNxNNet(N, scrambleStr){

  let grid = {};
  order.forEach(f => {
    grid[f] = [];
    for(let i=0;i<N*N;i++) grid[f].push(baseColors[f]);
  });
  
  // Apply visual variations based on scramble to ensure unique looks
  const totalShuffles = N === 4 ? 25 : 35;
  for(let k=0;k<totalShuffles;k++){
    const f1 = order[Math.floor(rand()*6)];
    const f2 = order[Math.floor(rand()*6)];

      const i1 = Math.floor(rand()*(N*N));
      const i2 = Math.floor(rand()*(N*N));
      const tmp = grid[f1][i1];
      grid[f1][i1] = grid[f2][i2];
      grid[f2][i2] = tmp;
    }
  }
  
  const S = Math.floor(80 / N);
  const gap = 1;
  const faceW = S*N + gap*(N-1);
  const layout = { U:[1,0], L:[0,1], F:[1,1], R:[2,1], B:[3,1], D:[1,2] };

function onTimerStatusChanged(timerState, recordedMs) {
  switch(timerState) {
    case 'HANDS_ON':
      display.classList.remove('go', 'inspecting', 'inspect-warn', 'inspect-danger');
      if(inspectionEnabled){
        startInspection();
      } else {
        display.classList.add('ready');
        display.textContent = '0.00';
      }
      break;
    case 'RUNNING':
      if(state === 'inspecting') stopInspection();
      display.classList.remove('ready', 'inspecting', 'inspect-warn', 'inspect-danger');
      display.classList.add('go');
      state = 'running';
      startTime = Date.now();
      tick();
      break;
    case 'STOPPED':
      cancelAnimationFrame(rafId);
      display.classList.remove('go');
      if(recordedMs !== null){
        const penalty = pendingPenalty;
        pendingPenalty = 0;
        const total = recordedMs + penalty*1000;
        display.textContent = formatTime(total) + (penalty ? ' (+2)' : '');
        state = 'idle';
        saveTime(total, false, penalty);
        newScramble();
      }
      break;
    default:
      break;
  }
}

// ถอดรหัสชุดข้อมูลจากค่าย GAN
function parseGanTimerPacket(dataView){
  const bytes = new Uint8Array(dataView.buffer);
  if(bytes.length < 3) return null;
  
  const stateByte = bytes[0]; 
  let timerState = null;
  
  if (stateByte === 0x06 || stateByte === 0x01) timerState = 'HANDS_ON';
  else if (stateByte === 0x03) timerState = 'RUNNING';
  else if (stateByte === 0x04 || stateByte === 0x05 || stateByte === 0x07) timerState = 'STOPPED';

  let recordedMs = null;
  if(timerState === 'STOPPED' && bytes.length >= 6){
    const minutes = bytes[2] || 0;
    const seconds = bytes[3] || 0;
    const msLo = bytes[4] || 0;
    const msHi = bytes[5] || 0;
    recordedMs = minutes * 60000 + seconds * 1000 + (msLo + msHi * 256);
  }
  return { timerState, recordedMs };
}

// ถอดรหัสชุดข้อมูลจากค่าย QiYi (Nordic UART Service Protocol)
function parseQiyiTimerPacket(dataView){
  const bytes = new Uint8Array(dataView.buffer);
  if(bytes.length < 2) return null;
  
  let timerState = null;
  const cmd = bytes[0];
  
  if (cmd === 0x01) timerState = 'HANDS_ON';
  else if (cmd === 0x02) timerState = 'RUNNING';
  else if (cmd === 0x03) timerState = 'STOPPED';
  
  let recordedMs = null;
  if (timerState === 'STOPPED' && bytes.length >= 5) {
    const min = bytes[1];
    const sec = bytes[2];
    const ms = bytes[3] * 256 + bytes[4];
    recordedMs = min * 60000 + sec * 1000 + ms;
  }
  return { timerState, recordedMs };
}

// รับค่า Notification Event จากฮาร์ดแวร์บลูทูธ
function handleTimerDataNotification(event){
  const value = event.target.value;
  let result = null;
  
  if (connectedBrand === 'GAN') {
    result = parseGanTimerPacket(value);
  } else if (connectedBrand === 'QIYI') {
    result = parseQiyiTimerPacket(value);
  }
  
  if (result && result.timerState) {
    onTimerStatusChanged(result.timerState, result.recordedMs);
  }
}

async function connectSmartTimer(){
  if(!navigator.bluetooth){
    setBtStatus('เบราว์เซอร์นี้ไม่รองรับ Web Bluetooth API (แนะนำให้ใช้ Google Chrome)', 'err');
    return;
  }
  try{
    setBtStatus('กำลังสแกนหาตัวจับเวลาไร้สาย...');
    
    btDevice = await navigator.bluetooth.requestDevice({
      filters: [
        { services: [TIMER_CONFIG.SERVICE.GAN] },
        { services: [TIMER_CONFIG.SERVICE.QIYI] },
        { namePrefix: 'GAN' },
        { namePrefix: 'QIYI' },
        { namePrefix: 'QY-' }
      ],
      optionalServices: [TIMER_CONFIG.SERVICE.GAN, TIMER_CONFIG.SERVICE.QIYI]
    });

    btDevice.addEventListener('gattserverdisconnected', () => {
      btConnected = false;
      connectedBrand = null;
      btBtn.textContent = '🔗 เชื่อมต่อ Bluetooth Timer';
      btBtn.classList.remove('connected');
      setBtStatus('การเชื่อมต่อหลุดจากอุปกรณ์แล้ว');
    });

    setBtStatus('กำลังเชื่อมต่อเซิร์ฟเวอร์อุปกรณ์...');
    btServer = await btDevice.gatt.connect();

    let service = null;
    let charUuid = null;
    
    try {
      service = await btServer.getPrimaryService(TIMER_CONFIG.SERVICE.GAN);
      charUuid = TIMER_CONFIG.CHARACTERISTIC.GAN_TIME;
      connectedBrand = 'GAN';
    } catch(e) {
      service = await btServer.getPrimaryService(TIMER_CONFIG.SERVICE.QIYI);
      charUuid = TIMER_CONFIG.CHARACTERISTIC.QIYI_TX;
      connectedBrand = 'QIYI';
    }

    setBtStatus(`ค้นพบระบบ ${connectedBrand}! กำลังเปิดฟังก์ชันแจ้งเตือน...`);
    const dataChar = await service.getCharacteristic(charUuid);
    await dataChar.startNotifications();
    dataChar.addEventListener('characteristicvaluechanged', handleTimerDataNotification);

inspectionToggle.addEventListener('change', (e) => {
  inspectionEnabled = e.target.checked;
  localStorage.setItem('rubikTimerInspectionEnabled', inspectionEnabled);
});
if(localStorage.getItem('rubikTimerInspectionEnabled') !== null){
  inspectionEnabled = localStorage.getItem('rubikTimerInspectionEnabled') === 'true';
  inspectionToggle.checked = inspectionEnabled;
}

function startInspection(){
  state = 'inspecting';
  inspectionTime = 15;
  display.className = 'inspecting';
  display.textContent = inspectionTime;
  
  // ล้างการสั่น/เสียงเดิม
  if('vibrate' in navigator) navigator.vibrate([100]);
  
  clearInterval(inspectionInterval);
  inspectionInterval = setInterval(() => {
    inspectionTime--;
    if(inspectionTime > 7){
      display.className = 'inspecting';
      display.textContent = inspectionTime;
    } else if(inspectionTime > 3){
      display.className = 'inspect-warn';
      display.textContent = inspectionTime;
      if(inspectionTime === 7 && voiceToggle.checked) speakText('7 seconds');
    } else if(inspectionTime > 0){
      display.className = 'inspect-danger';
      display.textContent = inspectionTime;
      if(inspectionTime === 3 && voiceToggle.checked) speakText('3 seconds');
    } else if(inspectionTime === 0){
      display.className = 'inspect-danger';
      display.textContent = '+2';
      pendingPenalty = 1; // +2
    } else if(inspectionTime <= -2){
      // เกิน 17 วินาที = DNF
      clearInterval(inspectionInterval);
      display.className = 'dnf';
      display.textContent = 'DNF';
      pendingPenalty = 2; // DNF
      
      // บันทึกข้อมูลแบบออโต้หากเปิดเชื่อมแบบบลูทูธไว้แล้วไม่ได้กด
      if(btConnected){
        saveTime(0, true, 2);
        state = 'idle';
        newScramble();
      }
    }
  }, 1000);
}

function stopInspection(){
  clearInterval(inspectionInterval);
}

function clearInspectVisualClasses(){
  display.classList.remove('inspecting', 'inspect-warn', 'inspect-danger', 'ready', 'go');
}

// ---------- Text to Speech Helper ----------
function speakTimeText(ms, isDnf, isPenalty){
  if(!voiceToggle.checked) return;
  if(isDnf){
    speakText('ดีเอ็นเอฟ');
    return;
  }
  let sec = ms / 1000;
  let txt = sec.toFixed(2) + " วินาที";
  if(isPenalty) txt += ' บวกสอง';
  speakText(txt);
}

function speakText(text){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel(); // ตัดคำพูดเดิม
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = text.match(/[a-zA-Z]/) ? 'en-US' : 'th-TH';
  utterance.rate = 1.1;
  window.speechSynthesis.speak(utterance);
}

// ---------- Format time utilities ----------
function formatTime(ms, isDnf=false, penalty=0){
  if(isDnf) return 'DNF';
  let sec = (ms / 1000).toFixed(2);
  if(ms >= 60000){
    let m = Math.floor(ms / 60000);
    let s = ((ms % 60000) / 1000).toFixed(2);
    if(s < 10) s = '0' + s;
    sec = `${m}:${s}`;
  }
  if(penalty === 1) return sec + ' (+2)';
  return sec;
}

// ---------- Core calculation methods ----------
let spacePressed = false;
let holdTimeout = null;

function handleKeyDown(e){
  if(e.code !== 'Space' || btConnected) return;
  e.preventDefault();
  if(spacePressed) return;
  
  if(state === 'running'){
    stopTimer();
    return;
  }
  if(state === 'inspecting'){
    stopInspection();
    display.className = 'ready';
    display.textContent = '0.00';
    spacePressed = true;
    return;
  }
  
  spacePressed = true;
  display.className = 'inspecting'; 
  
  holdTimeout = setTimeout(() => {
    display.className = 'ready';
    display.textContent = '0.00';
  }, 400); 
}

function handleKeyUp(e){
  if(e.code !== 'Space' || btConnected) return;
  e.preventDefault();
  clearTimeout(holdTimeout);
  
  if(!spacePressed) return;
  spacePressed = false;
  
  if(display.className === 'ready'){
    startTimer();
  } else {
    if(inspectionEnabled && state !== 'inspecting'){
      startInspection();
    } else {
      display.className = '';
      display.textContent = '0.00';
    }
  }
}

// แตะสัมผัสหน้าจอมือถือ
function handleTouchStart(e){
  if(btConnected) return;
  if(e.target.closest('#configBar, #history, #btSection, #sessionBar, #cubeTypeBar, #quickPenaltyBar')) return;
  e.preventDefault();
  
  if(state === 'running'){
    stopTimer();
    return;
  }
  if(state === 'inspecting'){
    stopInspection();
    display.className = 'ready';
    display.textContent = '0.00';
    spacePressed = true; 
    return;
  }
  
  spacePressed = true;
  display.className = 'inspecting';
  holdTimeout = setTimeout(() => {
    display.className = 'ready';
    display.textContent = '0.00';
  }, 400);
}

function handleTouchEnd(e){
  if(btConnected) return;
  if(!spacePressed) return;
  e.preventDefault();
  clearTimeout(holdTimeout);
  spacePressed = false;
  
  if(display.className === 'ready'){
    startTimer();
  } else {
    if(inspectionEnabled && state !== 'inspecting'){
      startInspection();
    } else {
      display.className = '';
      display.textContent = '0.00';
    }
  }
}

window.addEventListener('keydown', handleKeyDown);
window.addEventListener('keyup', handleKeyUp);
display.addEventListener('touchstart', handleTouchStart);
display.addEventListener('touchend', handleTouchEnd);

function startTimer(){
  clearInspectVisualClasses();
  display.classList.add('go');
  state = 'running';
  startTime = Date.now();
  tick();
}

function tick(){
  if(state !== 'running') return;
  elapsed = Date.now() - startTime;
  display.textContent = formatTime(elapsed);
  rafId = requestAnimationFrame(tick);
}

function stopTimer(){
  cancelAnimationFrame(rafId);
  display.classList.remove('go');
  state = 'idle';
  
  const penalty = pendingPenalty;
  pendingPenalty = 0; // รีเซ็ตสากลหลังจากบันทึก
  
  const finalTime = elapsed + (penalty === 1 ? 2000 : 0);
  const finalDnf = (penalty === 2);
  
  saveTime(finalTime, finalDnf, penalty);
  newScramble();
}

function saveTime(ms, isDnf=false, penalty=0){
  times.push({
    ms: ms,
    isDnf: isDnf,
    penalty: penalty, 
    scramble: currentScramble,
    date: new Date().toLocaleString('th-TH'),
    cubeType: getCurrentCubeType()
  });
  
  saveSessionsToStorage();
  renderHistory();
  renderStats();
  
  // สั่งอ่านเวลาออกเสียงผ่านเว็บเบราว์เซอร์
  speakTimeText(ms, isDnf, penalty === 1);
}

function deleteTime(idx){
  if(confirm('คุณต้องการลบสถิติรอบนี้ใช่หรือไม่?')){
    times.splice(idx, 1);
    saveSessionsToStorage();
    renderHistory();
    renderStats();
  }
}

function togglePenalty(idx){
  if(times.length === 0) return;
  const t = times[idx === 0 ? times.length - 1 : idx];
  if(t.penalty === 1){
    t.penalty = 0;
    t.ms -= 2000;
  } else {
    if(t.isDnf){
      t.isDnf = false;
    }
    t.penalty = 1;
    t.ms += 2000;
  }
  saveSessionsToStorage();
  renderHistory();
  renderStats();
}

function toggleDnf(idx){
  if(times.length === 0) return;
  const t = times[idx === 0 ? times.length - 1 : idx];
  if(t.isDnf){
    t.isDnf = false;
    t.penalty = 0;
  } else {
    t.isDnf = true;
    t.penalty = 2;
  }
  saveSessionsToStorage();
  renderHistory();
  renderStats();
}

// ---------- UI Render Statistics Functions ----------
function calcMean(arr){
  const valid = arr.filter(t => !t.isDnf);
  if(valid.length === 0) return '-';
  let sum = valid.reduce((acc, t) => acc + t.ms, 0);
  return formatTime(sum / valid.length);
}

function calcAvg(arr){
  // WCA Average rules: ตัดหัวท้าย 1 อันที่เร็วสุดและช้าสุด
  if(arr.length < 3) return '-';
  
  let sorted = [...arr].sort((a,b) => {
    if(a.isDnf) return 1;
    if(b.isDnf) return -1;
    return a.ms - b.ms;
  });
  
  // เช็คเงื่อนไข DNF
  const dnfCount = sorted.filter(t => t.isDnf).length;
  if(dnfCount > 1) return 'DNF';
  
  // ตัดหัวท้ายออก
  sorted.pop();
  sorted.shift();
  
  let sum = sorted.reduce((acc, t) => acc + t.ms, 0);
  return formatTime(sum / sorted.length);
}

function renderStats(){
  const cubeType = getCurrentCubeType();
  const currentTimes = times; 
  
  const pBtn = document.getElementById('penaltyLastBtn');
  const dBtn = document.getElementById('dnfLastBtn');
  if(currentTimes.length === 0){
    pBtn.disabled = true;
    dBtn.disabled = true;
  } else {
    pBtn.disabled = false;
    dBtn.disabled = false;
    
    const lastT = currentTimes[currentTimes.length - 1];
    pBtn.className = lastT.penalty === 1 ? 'active' : '';
    dBtn.className = lastT.isDnf ? 'active' : '';
  }

  // ค้นหาเวลาปกติที่ดีที่สุด
  const validTimes = currentTimes.filter(t => !t.isDnf);
  let best = '-';
  if(validTimes.length > 0){
    let minMs = Math.min(...validTimes.map(t => t.ms));
    best = formatTime(minMs);
  }
  document.getElementById('statBest').textContent = best;
  
  // คำนวณ Ao5, Ao12
  let ao5 = '-';
  if(currentTimes.length >= 5){
    ao5 = calcAvg(currentTimes.slice(-5));
  }
  document.getElementById('statAo5').textContent = ao5;
  
  let ao12 = '-';
  if(currentTimes.length >= 12){
    ao12 = calcAvg(currentTimes.slice(-12));
  }
  document.getElementById('statAo12').textContent = ao12;
  document.getElementById('statMean').textContent = calcMean(currentTimes);
  
  updateChart();
}

function renderHistory(){
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  
  if(times.length === 0){
    list.innerHTML = '<div class="empty">ยังไม่มีข้อมูลสถิติในเซสชันนี้</div>';
    return;
  }
  
  // หาไอดีแมตช์ที่ทำเวลาได้ดีที่สุดเพื่อติดดาวทองความสวยงาม
  const validTimes = times.filter(t => !t.isDnf);
  let minMs = validTimes.length > 0 ? Math.min(...validTimes.map(t => t.ms)) : -1;

  // วาดจากอันล่าสุดขึ้นมาข้างบนสุด
  for(let i=times.length-1; i>=0; i--){
    const t = times[i];
    const isBest = (!t.isDnf && t.ms === minMs);
    
    const row = document.createElement('div');
    row.className = 'time-row' + (isBest ? ' best-time' : '');
    
    // คลิกแถวประวัติเพื่อเปิด/ปิดดูรายละเอียดชุด Scramble
    row.addEventListener('click', (e) => {
      if(e.target.closest('.row-actions, button, span')) return;
      row.classList.toggle('expanded');
    });
    
    row.innerHTML = `
      <div class="row-main">
        <span>
          <span class="idx">#${i+1}</span>
          ${isBest ? '<span class="best-star">⭐</span>' : ''}
          <b>${formatTime(t.ms, t.isDnf, t.penalty)}</b>
        </span>
        <span class="row-actions">
          <span class="pen-btn ${t.penalty === 1 ? 'active' : ''}" onclick="togglePenalty(${i})" title="บวกเวลาพิเศษ +2 วินาที">+2</span>
          <span class="dnf-btn ${t.isDnf ? 'active' : ''}" onclick="toggleDnf(${i})" title="ตั้งค่ารอบนี้เป็น DNF">DNF</span>
          <span class="del" onclick="deleteTime(${i})" title="ลบข้อมูลรอบนี้">🗑️</span>
        </span>
      </div>
      <div class="row-scramble">
        <div><b>สูตรสลับ:</b> ${t.scramble || '-'}</div>
        <div style="font-size:10px; opacity:0.7; margin-top:2px;">⏱️ ${t.date || ''}</div>
      </div>
    `;
    list.appendChild(row);
  }
}

  }
  let csv = '\uFEFF'; 
  csv += 'ครั้งที่,ประเภทคิวบ์,เวลาจับ (มิลลิวินาที),ข้อความเวลา,สถานะเพนัลตี้,สูตรสลับลูก (Scramble),วันเวลาที่เล่น\n';
  
  times.forEach((t, i) => {
    let pText = 'ปกติ';
    if(t.penalty === 1) pText = '+2';
    if(t.isDnf) pText = 'DNF';
    
    const cleanScramble = (t.scramble || '').replace(/"/g, '""');
    csv += `${i+1},"${t.cubeType || '3x3'}",${t.ms},"${formatTime(t.ms, t.isDnf, t.penalty)}","${pText}","${cleanScramble}","${t.date}"\n`;
  });
  
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.setAttribute('href', url);
  link.setAttribute('download', `cube_times_${getCurrentCubeType()}_${Date.now()}.csv`);
  link.style.visibility = 'hidden';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

// ---------- Theme customization engine ----------
function setTheme(themeName){
  document.body.className = ''; 
  if(themeName !== 'space'){
    document.body.classList.add('theme-' + themeName);
  }
  localStorage.setItem('rubikTimerTheme', themeName);
  
  if(times.length >= 2){
    updateChart();
  }
}

themeSelect.addEventListener('change', (e) => {
  setTheme(e.target.value);
});

// โหลดข้อมูลความต้องการของยูสเซอร์เมื่อเริ่มต้นระบบ
function loadUserPreferences(){
  const savedTheme = localStorage.getItem('rubikTimerTheme') || 'space';
  themeSelect.value = savedTheme;
  setTheme(savedTheme);

  const savedVoice = localStorage.getItem('rubikTimerVoice');
  if(savedVoice !== null){
    voiceToggle.checked = savedVoice === 'true';
  } else {
    voiceToggle.checked = true;
  }
}

voiceToggle.addEventListener('change', (e) => {
  localStorage.setItem('rubikTimerVoice', e.target.checked);
});

// ---------- Init ----------
loadSessions();
populateSessionSelect();
syncCubeTypeSelect();
loadUserPreferences(); 
renderHistory();
renderStats();
newScramble();

// ---------- PWA ----------
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if(!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if(newWorker.state === 'activated'){
            console.log('Cube Timer: แคชออฟไลน์อัปเดตแล้ว');
          }
        });
      });
    }).catch(err => console.log('ServiceWorker ล้มเหลว: ', err));
  });
}
</script>
