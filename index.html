<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Rubik's Cube Timer</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#05050f">
<meta name="description" content="ตัวจับเวลาลูกบาศก์รูบิค พร้อม scramble, สถิติ, session และรองรับ GAN Smart Timer">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cube Timer">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root{
    --bg:#05050f;
    --panel:rgba(30,24,58,0.55);
    --panel-solid:#181233;
    --accent:#00e5ff;
    --accent2:#ffc857;
    --danger:#ff5f8f;
    --purple:#a78bfa;
    --text:#e9e8ff;
    --muted:#8f8cba;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Tahoma, sans-serif;
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(167,139,250,0.25), transparent 60%),
      radial-gradient(ellipse 800px 600px at 110% 10%, rgba(0,229,255,0.15), transparent 55%),
      radial-gradient(ellipse at top, #1b1035 0%, #05050f 55%),
      var(--bg);
    color:var(--text);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    user-select:none;
    position:relative;
    overflow-x:hidden;
    transition: background 0.3s, color 0.3s;
  }
  
  /* --- Themes CSS --- */
  body.theme-amoled {
    --bg:#000000;
    --panel:rgba(20,20,20,0.8);
    --panel-solid:#151515;
    --accent:#ffffff;
    --accent2:#00e5ff;
    --danger:#ff3b30;
    --purple:#8e8e93;
    --text:#ffffff;
    --muted:#8e8e93;
    background: #000000;
  }
  body.theme-light {
    --bg:#f4f5f6;
    --panel:rgba(255,255,255,0.85);
    --panel-solid:#ffffff;
    --accent:#007aff;
    --accent2:#e0a900;
    --danger:#ff3b30;
    --purple:#5856d6;
    --text:#1c1c1e;
    --muted:#8e8e93;
    background: #f4f5f6;
  }
  body.theme-cyberpunk {
    --bg:#000511;
    --panel:rgba(0,10,24,0.7);
    --panel-solid:#001533;
    --accent:#00ffcc;
    --accent2:#fffb00;
    --danger:#ff0077;
    --purple:#cc00ff;
    --text:#00ffcc;
    --muted:#00aaff;
    background: radial-gradient(circle at center, #001026 0%, #000511 100%), #000511;
  }

  body::before, body::after{
    content:"";
    position:fixed;
    top:0;
    left:0; right:0; bottom:0;
    pointer-events:none;
    background-repeat:repeat;
    z-index:0;
  }
  body::before{
    background-image:
      radial-gradient(1.6px 1.6px at 20px 30px, #fff, transparent),
      radial-gradient(1px 1px at 90px 120px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 160px 60px, #fff, transparent),
      radial-gradient(1px 1px at 210px 180px, #fff, transparent),
      radial-gradient(1.6px 1.6px at 250px 20px, #fff, transparent),
      radial-gradient(1px 1px at 300px 150px, #fff, transparent);
    background-size:340px 240px;
    opacity:.55;
    animation:twinkle 4s ease-in-out infinite alternate;
  }
  body::after{
    background-image:
      radial-gradient(1px 1px at 40px 90px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 130px 40px, #fff, transparent),
      radial-gradient(1px 1px at 190px 140px, #fff, transparent),
      radial-gradient(1.3px 1.3px at 270px 100px, #fff, transparent),
      radial-gradient(1px 1px at 320px 200px, #fff, transparent);
    background-size:360px 260px;
    opacity:.35;
    animation:twinkle 6s ease-in-out infinite alternate-reverse;
  }
  body.theme-amoled::before, body.theme-amoled::after,
  body.theme-light::before, body.theme-light::after {
    display: none;
  }
  
  @keyframes twinkle{
    0%{opacity:.2;}
    100%{opacity:.7;}
  }
  body > *{
    position:relative;
    z-index:1;
  }
  h1{
    font-size:22px;
    color:var(--text);
    letter-spacing:1px;
    margin-bottom:4px;
    text-shadow:0 0 12px rgba(0,229,255,0.6), 0 0 24px rgba(167,139,250,0.4);
    text-align: center;
  }
  #scramble{
    font-size:22px;
    font-weight:600;
    letter-spacing:2px;
    background:var(--panel);
    backdrop-filter:blur(6px);
    border:1px solid rgba(0,229,255,0.25);
    box-shadow:0 0 20px rgba(0,229,255,0.08), inset 0 0 20px rgba(167,139,250,0.06);
    padding:14px 24px;
    border-radius:12px;
    margin:12px 0 30px;
    text-align:center;
    max-width:700px;
  }
  #timerDisplay{
    font-size:96px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
    transition:color .15s, text-shadow .15s;
    margin:10px 0 30px;
    -webkit-user-select:none;
    -webkit-touch-callout:none;
    touch-action:manipulation;
    padding:20px 40px;
    border-radius:20px;
    cursor:pointer;
    text-shadow:0 0 18px rgba(233,232,255,0.25);
  }
  @media (max-width:480px){
    #timerDisplay{
      font-size:64px;
      padding:16px 24px;
    }
  }
  .ready{color:var(--accent2) !important; text-shadow:0 0 24px rgba(255,200,87,0.7) !important;}
  .go{color:var(--accent) !important; text-shadow:0 0 24px rgba(0,229,255,0.7) !important;}
  .inspecting{color:var(--purple) !important; text-shadow:0 0 24px rgba(167,139,250,0.7) !important;}
  .inspect-warn{color:var(--accent2) !important; text-shadow:0 0 24px rgba(255,200,87,0.7) !important;}
  .inspect-danger{color:var(--danger) !important; text-shadow:0 0 24px rgba(255,95,143,0.7) !important;}
  .penalty{color:var(--accent2) !important;}
  .dnf{color:var(--danger) !important;}
  
  #configBar{
    display:flex;
    align-items:center;
    gap:15px;
    font-size:13px;
    color:var(--muted);
    margin-bottom:24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  #configBar label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  #configBar input, #configBar select{
    cursor:pointer;
  }
  #configBar select {
    background: var(--panel-solid);
    color: var(--text);
    border: 1px solid rgba(167,139,250,0.35);
    padding: 4px 8px;
    border-radius: 6px;
  }
  
  #hint{
    color:var(--muted);
    font-size:14px;
    margin-bottom:30px;
    text-align: center;
  }
  .stats{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:24px;
  }
  .stat-box{
    background:var(--panel);
    backdrop-filter:blur(6px);
    border:1px solid rgba(167,139,250,0.25);
    box-shadow:0 0 16px rgba(167,139,250,0.08);
    border-radius:10px;
    padding:12px 18px;
    text-align:center;
    min-width:90px;
  }
  .stat-box .label{
    font-size:12px;
    color:var(--muted);
    margin-bottom:4px;
  }
  .stat-box .value{
    font-size:20px;
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  
  #chartContainer {
    width: 100%;
    max-width: 500px;

    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 12px;

  #history{
    width:100%;
    max-width:500px;
    background:var(--panel);
    backdrop-filter:blur(6px);
    border:1px solid rgba(0,229,255,0.2);
    box-shadow:0 0 20px rgba(0,229,255,0.06);

    color:var(--muted);

    cursor:pointer;

  .time-row .idx{color:var(--muted); margin-right:10px;}
  .row-actions{display:flex; gap:10px; align-items:center;}
  .del{

    cursor:pointer;

  .del:hover{color:var(--danger);}
  .pen-btn{

  .dnf-btn{

    cursor:pointer;

  }
  .dnf-btn:hover{color:var(--danger);}
  .dnf-btn.active{color:var(--danger); font-weight:700;}
  #quickPenaltyBar{

    gap:10px;
    margin:0 0 24px;

  #quickPenaltyBar button{

    backdrop-filter:blur(6px);
    color:var(--text);
    border:1px solid rgba(255,200,87,0.35);

    font-size:13px;

  #quickPenaltyBar button:hover{box-shadow:0 0 12px rgba(255,200,87,0.4);}

  .empty{

    font-size:13px;
    text-align:center;
    padding:10px 0;
  }
  #btSection{
    margin-bottom:26px;
    text-align:center;
  }
  #btConnectBtn{
    background:var(--panel);
    backdrop-filter:blur(6px);
    color:var(--text);
    border:1px solid rgba(167,139,250,0.35);
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
  }
  #btConnectBtn:hover{border-color:var(--accent); box-shadow:0 0 14px rgba(0,229,255,0.35);}
  #btConnectBtn.connected{
    border-color:var(--accent);
    color:var(--accent);
    box-shadow:0 0 14px rgba(0,229,255,0.35);
  }
  #btStatus{
    margin-top:8px;
    font-size:12px;
    color:var(--muted);
  }
  #btStatus.err{color:var(--danger);}
  #btStatus.ok{color:var(--accent);}
  #credit{
    margin-top:30px;
    padding-bottom:10px;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.5px;
  }
  #sessionBar{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:10px;
    flex-wrap:wrap;
    justify-content:center;
  }
  #sessionBar select, #sessionBar button{
    background:var(--panel-solid);
    color:var(--text);
    border:1px solid rgba(167,139,250,0.35);
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;

  #sessionBar select{cursor:pointer;}
  #sessionBar button:hover{border-color:var(--accent); box-shadow:0 0 10px rgba(0,229,255,0.3);}
  #cubeTypeBar{
    display:flex;
    gap:8px;
    align-items:center;
    margin-bottom:18px;
    font-size:12px;
    color:var(--muted);
  }
  #cubeTypeBar select{
    background:var(--panel-solid);
    color:var(--text);
    border:1px solid rgba(167,139,250,0.35);
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
  }
  #cubeTypeBar select:hover{border-color:var(--accent);}
  #cubeNetWrap{
    margin-bottom:20px;
  }
  #cubeNetWrap svg{
    display:block;
  }
  .action-btn{
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    padding:4px 8px;
    border-radius:6px;
    cursor:pointer;
    font-size:12px;
    margin-right:4px;
  }
  .action-btn:hover{background:var(--accent); color:#111;}
  .time-row{
    display:block;
    padding:6px 0;
    border-bottom:1px solid rgba(167,139,250,0.15);
    font-size:14px;
    font-variant-numeric:tabular-nums;
    cursor:pointer;
  }
  .time-row .row-main{
    display:flex;
    justify-content:space-between;
  }
  .time-row .row-scramble{
    display:none;
    font-size:11px;
    font-variant-numeric:normal;
    color:var(--muted);
    margin-top:4px;
    letter-spacing:1px;
    word-break:break-all;
  }
  .time-row.expanded .row-scramble{display:block;}
  .time-row:last-child{border-bottom:none;}
  .time-row.best-time{
    background:linear-gradient(90deg, rgba(255,200,87,0.16), transparent 75%);
    border-left:3px solid var(--accent2);
    border-radius:6px;
    padding-left:9px;
    margin-left:-3px;
  }
  .time-row.best-time .row-main{
    color:var(--accent2);
    font-weight:700;
  }
  .best-star{
    margin-right:6px;
    filter:drop-shadow(0 0 4px rgba(255,200,87,0.6));
  }
</style>

<body>

<h1>🪐 RUBIK'S CUBE TIMER — SPACE EDITION 🚀</h1>

<div id="sessionBar">

    ประวัติเวลา

<script>
// ---------- Scramble generator ----------
const FACES = ['U','D','L','R','F','B'];
const MODS = ['', "'", '2'];
const OPPOSITE = {U:'D',D:'U',L:'R',R:'L',F:'B',B:'F'};

function generateScramble(len=20){
  let moves = [];
  let last = '', lastAxis = '';
  for(let i=0;i<len;i++){
    let face;
    do {
      face = FACES[Math.floor(Math.random()*FACES.length)];
    } while(face === last || (OPPOSITE[face] === last && face === lastAxis));
    lastAxis = last;
    last = face;
    const mod = MODS[Math.floor(Math.random()*MODS.length)];
    moves.push(face+mod);
  }
  return moves.join(' ');
}

function generateSimpleScramble(faces, mods, len){
  let moves = [];
  let last = '';
  for(let i=0;i<len;i++){
    let face;
    do {
      face = faces[Math.floor(Math.random()*faces.length)];
    } while(face === last);
    last = face;
    const mod = mods[Math.floor(Math.random()*mods.length)];
    moves.push(face+mod);
  }
  return moves.join(' ');
}

function generateWideScramble(len){
  const faces = ['U','D','L','R','F','B'];
  const AXIS = {U:'UD',D:'UD',L:'LR',R:'LR',F:'FB',B:'FB'};
  const mods = ['', "'", '2'];
  let moves = [];
  let lastAxis = '';
  for(let i=0;i<len;i++){
    let base;
    do {
      base = faces[Math.floor(Math.random()*faces.length)];
    } while(AXIS[base] === lastAxis);
    lastAxis = AXIS[base];
    const wide = Math.random() < 0.5;
    const mod = mods[Math.floor(Math.random()*mods.length)];
    moves.push(base + (wide ? 'w' : '') + mod);
  }
  return moves.join(' ');
}

function generatePyraminxScramble(){
  const faces = ['U','L','R','B'];
  const mods = ['', "'"];
  let moves = generateSimpleScramble(faces, mods, 10).split(' ');
  ['u','l','r','b'].forEach(tip => {
    if(Math.random() < 0.7){
      const mod = mods[Math.floor(Math.random()*mods.length)];
      moves.push(tip+mod);
    }
  });
  return moves.join(' ');
}

const OLL_CASES = [
  "R U2 R2 F R F' U2 R' F R F'", "F R U R' U' F'", "f R U R' U' f'", "f R U R' U' f' U' F R U R' U' F'",
  "r U R' U' r' F R F'", "F' L' U' L U F", "f' L' U' L U f", "f' L' U' L U f U F' L' U' L U F"
];
const PLL_CASES = [
  "R' U L' U2 R U' R' U2 R L", "R U R' F' R U R' U' R' F R2 U' R'", "x R2 D2 R U R' D2 R U' R",
  "R U' R U R U R U' R' U' R2", "M2 U M2 U2 M2 U M2", "R' U' R U' R U R U' R' U R U R2 U' R'"
];
const F2L_CASES = [
  "R U R' U' R U R'", "R U' R' U R U' R'", "R U2 R' U' R U R'", "R U' R' U2 R U' R'"
];
const SCRAMBLERS = {
  '2x2': () => generateSimpleScramble(['U','R','F'], ['', "'", '2'], 9),
  '3x3': () => generateScramble(20),
  '3x3_f2l': () => "F2L: " + F2L_CASES[Math.floor(Math.random() * F2L_CASES.length)],
  '3x3_oll': () => "OLL: " + OLL_CASES[Math.floor(Math.random() * OLL_CASES.length)],
  '3x3_pll': () => "PLL: " + PLL_CASES[Math.floor(Math.random() * PLL_CASES.length)],
  '4x4': () => generateWideScramble(40),
  '5x5': () => generateWideScramble(60),

function composePerm(p1, p2){
  const out = new Array(54);
  for(let i=0;i<54;i++) out[i] = p2[p1[i]];
  return out;
}
function invertPerm(p){
  const out = new Array(54);
  for(let i=0;i<54;i++) out[p[i]] = i;
  return out;
}
function getMovePerm(move){
  const face = move[0];
  const mod = move.slice(1);
  const base = CUBE_BASE_MOVES[face];
  if(mod === "'") return invertPerm(base);
  if(mod === '2') return composePerm(base, base);
  return base;
}
function applyPerm(stateArr, perm){
  const out = new Array(54);
  for(let i=0;i<54;i++) out[perm[i]] = stateArr[i];
  return out;
}
function solvedFacelets(){
  const order = ['U','R','F','D','L','B'];
  let arr = [];
  order.forEach(f => { for(let i=0;i<9;i++) arr.push(f); });
  return arr;
}
function scrambleToFacelets(scrambleStr){
  let s = solvedFacelets();
  scrambleStr.trim().split(/\s+/).forEach(mv => {
    if(!mv || mv.includes(':')) return;
    s = applyPerm(s, getMovePerm(mv));
  });
  return s;
}
const FACE_COLOR = { U:'#f7f7f7', D:'#ffd500', F:'#00a352', B:'#1054c4', R:'#c8102e', L:'#ff6a00' };

function renderCubeNet(scrambleStr){

// ---------- Seeded PRNG ----------
function hashSeed(str){
  let h = 1779033703 ^ str.length;
  for(let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return function(){
    h = Math.imul(h ^ (h>>>16), 2246822507);
    h = Math.imul(h ^ (h>>>13), 3266489909);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  };
}

function renderPuzzlePreview(type, scrambleStr){
  if(type === '3x3' || type === '3x3_f2l' || type === '3x3_oll' || type === '3x3_pll'){
    const sc = scrambleStr.includes(':') ? scrambleStr.split(':')[1].trim() : scrambleStr;
    renderCubeNet(sc);
  } else if(type === '2x2'){
    render2x2Net(scrambleStr);
  } else if(type === '4x4'){
    renderNxNNet(4, scrambleStr);
  } else if(type === '5x5'){
    renderNxNNet(5, scrambleStr);
  } else if(type === 'pyraminx'){
    renderPyraminxNet(scrambleStr);
  } else if(type === 'skewb'){
    renderSkewbNet(scrambleStr);
  } else {
    renderCubeNet(scrambleStr);
  }
}

function render2x2Net(scrambleStr){
  const facelets = scrambleToFacelets(scrambleStr);
  const S = 30; const gap = 2;
  const faceW = S*2 + gap;
  const layout = { U:[1,0], L:[0,1], F:[1,1], R:[2,1], B:[3,1], D:[1,2] };
  const totalW = faceW*4 + 20*3;
  const totalH = faceW*3 + 20*2;
  const fIdx = { U:0, R:9, F:18, D:27, L:36, B:45 };
  
  let svg = `<svg viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;height:auto;margin:0 auto;display:block;">`;
  Object.keys(layout).forEach(face => {
    const [gx, gy] = layout[face];
    const ox = gx*(faceW+20);
    const oy = gy*(faceW+20);
    const base = fIdx[face];
    // mapping 2x2 corners inside 3x3 array (0,1,3,4)
    const map2x2 = [0,1,3,4];
    for(let r=0;r<2;r++){
      for(let c=0;c<2;c++){
        const color = FACE_COLOR[facelets[base + map2x2[r*2+c]]];
        const x = ox + c*(S+gap);
        const y = oy + r*(S+gap);
        svg += `<rect x="${x}" y="${y}" width="${S}" height="${S}" rx="4" fill="${color}" stroke="#0f1115" stroke-width="1.5"/>`;
      }
    }
  });
  svg += `</svg>`;
  document.getElementById('cubeNetWrap').innerHTML = svg;
}

function renderNxNNet(N, scrambleStr){
  let rand = hashSeed(scrambleStr);
  const S = Math.floor(90/N); const gap = 1;
  const faceW = S*N + gap*(N-1);
  const layout = { U:[1,0], L:[0,1], F:[1,1], R:[2,1], B:[3,1], D:[1,2] };
  const totalW = faceW*4 + 20*3;
  const totalH = faceW*3 + 20*2;
  
  let svg = `<svg viewBox="0 0 ${totalW} ${totalH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:380px;height:auto;margin:0 auto;display:block;">`;
  Object.keys(layout).forEach(face => {
    const [gx, gy] = layout[face];
    const ox = gx*(faceW+20);
    const oy = gy*(faceW+20);
    for(let r=0;r<N;r++){
      for(let c=0;c<N;c++){
        let color = FACE_COLOR[face];
        if(rand() < 0.28){ // simulate scrambled mix
          const keys = Object.keys(FACE_COLOR);
          color = FACE_COLOR[keys[Math.floor(rand()*keys.length)]];
        }
        const x = ox + c*(S+gap);
        const y = oy + r*(S+gap);
        svg += `<rect x="${x}" y="${y}" width="${S}" height="${S}" rx="2" fill="${color}" stroke="#0f1115" stroke-width="1"/>`;
      }
    }
  });
  svg += `</svg>`;
  document.getElementById('cubeNetWrap').innerHTML = svg;
}

function renderPyraminxNet(scrambleStr){
  let rand = hashSeed(scrambleStr);
  const colors = ['#ffd500','#00a352','#1054c4','#c8102e'];
  let svg = `<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:320px;height:auto;margin:0 auto;display:block;">`;
  
  function tri(x1,y1,x2,y2,x3,y3,c){
    return `<polygon points="${x1},${y1} ${x2},${y2} ${x3},${y3}" fill="${c}" stroke="#0f1115" stroke-width="1.5" stroke-linejoin="round"/>`;
  }
  // render center layout representation
  const centers = [
    [160,20, 100,120, 220,120],
    [100,120, 40,190, 160,190],
    [220,120, 160,190, 280,190]
  ];
  centers.forEach(pts => {
    let c = colors[Math.floor(rand()*colors.length)];
    svg += tri(pts[0],pts[1], pts[2],pts[3], pts[4],pts[5], c);
    // sub pieces inner
    let midX = (pts[0]+pts[2]+pts[4])/3;
    let midY = (pts[1]+pts[3]+pts[4])/3;
  });
  svg += `</svg>`;
  document.getElementById('cubeNetWrap').innerHTML = svg;
}

function renderSkewbNet(scrambleStr){
  let rand = hashSeed(scrambleStr);
  let svg = `<svg viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:280px;height:auto;margin:0 auto;display:block;">`;
  const faces = [
    {cx:70, cy:60, name:'L'}, {cx:130, cy:60, name:'U'}, {cx:190, cy:60, name:'R'},
    {cx:70, cy:130, name:'D'}, {cx:130, cy:130, name:'F'}, {cx:190, cy:130, name:'B'}
  ];
  faces.forEach(f => {
    const r = 24;
    const x = f.cx, y = f.cy;
    let cc = FACE_COLOR[f.name] || '#fff';
    // Square background center
    svg += `<rect x="${x-r}" y="${y-r}" width="${r*2}" height="${r*2}" fill="${cc}" stroke="#0f1115" stroke-width="1.5"/>`;
    // Diagonal lines to show skewb cuts
    svg += `<line x1="${x-r}" y1="${y-r}" x2="${x+r}" y2="${y+r}" stroke="#0f1115" stroke-width="1.5"/>`;
    svg += `<line x1="${x+r}" y1="${y-r}" x2="${x-r}" y2="${y+r}" stroke="#0f1115" stroke-width="1.5"/>`;
    // Corner color drops simulation
    for(let d=0; d<4; d++){
      if(rand() < 0.35){
        let rc = FACE_COLOR[Object.keys(FACE_COLOR)[Math.floor(rand()*6)]];
        let pts = '';
        if(d===0) pts=`${x-r},${y-r} ${x},${y} ${x-r},${y}`;
        if(d===1) pts=`${x+r},${y-r} ${x},${y} ${x},${y-r}`;
        if(d===2) pts=`${x+r},${y+r} ${x},${y} ${x+r},${y}`;
        if(d===3) pts=`${x-r},${y+r} ${x},${y} ${x},${y+r}`;
        svg += `<polygon points="${pts}" fill="${rc}" stroke="#0f1115" stroke-width="0.5"/>`;
      }
    }
  });
  svg += `</svg>`;
  document.getElementById('cubeNetWrap').innerHTML = svg;
}

function setBtStatus(text, cls){
  btStatus.textContent = text;

function onTimerStatusChanged(timerState, recordedMs) {
  switch(timerState) {
    case 'HANDS_ON':
      display.classList.remove('go', 'inspecting', 'inspect-warn', 'inspect-danger');
      if(inspectionEnabled){
        startInspection();
      } else {
        display.classList.add('ready');
        display.textContent = '0.00';
      }
      break;
    case 'RUNNING':
      if(state === 'inspecting') stopInspection();
      display.classList.remove('ready', 'inspecting', 'inspect-warn', 'inspect-danger');
      display.classList.add('go');
      state = 'running';
      startTime = Date.now();
      tick();
      break;
    case 'STOPPED':
      cancelAnimationFrame(rafId);
      display.classList.remove('go');
      if(recordedMs !== null){
        const penalty = pendingPenalty;
        pendingPenalty = 0;
        const total = recordedMs + penalty*1000;
        display.textContent = formatTime(total) + (penalty ? ' (+2)' : '');
        state = 'idle';
        saveTime(total, false, penalty);
        newScramble();
      }
      break;
    default:
      break;
  }
}

function parseGanTimerPacket(dataView){
  const bytes = new Uint8Array(dataView.buffer);
  if(bytes.length < 3) return null;
  
  const stateByte = bytes[0]; 
  let timerState = null;
  
  if (stateByte === 0x06 || stateByte === 0x01) timerState = 'HANDS_ON';
  else if (stateByte === 0x03) timerState = 'RUNNING';
  else if (stateByte === 0x04 || stateByte === 0x05 || stateByte === 0x07) timerState = 'STOPPED';

  let recordedMs = null;
  if(timerState === 'STOPPED' && bytes.length >= 6){
    const minutes = bytes[2] || 0;
    const seconds = bytes[3] || 0;
    const msLo = bytes[4] || 0;
    const msHi = bytes[5] || 0;
    recordedMs = minutes * 60000 + seconds * 1000 + (msLo + msHi * 256);
  }
  return { timerState, recordedMs };
}

// ฟังก์ชันแกะข้อมูลชุดใหม่สำหรับ QiYi Smart Timer V2 (พัฒนาตาม UUID จากภาพ nRF)
function parseQiyiTimerPacket(dataView){
  const bytes = new Uint8Array(dataView.buffer);
  if(bytes.length < 2) return null;
  
  let timerState = null;
  const cmd = bytes[0];
  
  // โครงสร้างคำสั่งสถานะปกติของบอร์ด QiYi
  if (cmd === 0x01) timerState = 'HANDS_ON';
  else if (cmd === 0x02) timerState = 'RUNNING';
  else if (cmd === 0x03) timerState = 'STOPPED';
  
  let recordedMs = null;
  if (timerState === 'STOPPED' && bytes.length >= 5) {
    const min = bytes[1];
    const sec = bytes[2];
    const ms = bytes[3] * 256 + bytes[4];
    recordedMs = min * 60000 + sec * 1000 + ms;
  }
  return { timerState, recordedMs };
}

function handleTimerDataNotification(event){
  const value = event.target.value;
  let result = null;
  
  if (connectedBrand === 'GAN') {
    result = parseGanTimerPacket(value);
  } else if (connectedBrand === 'QIYI') {
    result = parseQiyiTimerPacket(value);
  }
  
  if (result && result.timerState) {
    onTimerStatusChanged(result.timerState, result.recordedMs);
  }
}

async function connectSmartTimer(){
  if(!navigator.bluetooth){
    setBtStatus('เบราว์เซอร์นี้ไม่รองรับ Web Bluetooth API (แนะนำให้ใช้ Google Chrome)', 'err');
    return;
  }
  try{
    setBtStatus('กำลังสแกนหาตัวจับเวลาไร้สาย...');
    
    btDevice = await navigator.bluetooth.requestDevice({
      filters: [
        { namePrefix: 'GAN' },
        { namePrefix: 'QIYI' },
        { namePrefix: 'QY-' },
        { namePrefix: 'Smart' },
        { namePrefix: 'Timer' }
      ],
      optionalServices: [
        '5833ff01-9b8b-5191-6142-22a4536ef123', // QiYi Smart Timer V2 Service UUID ชุดหลัก
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e', // QiYi V1 Base Service
        '0000fee7-0000-1000-8000-00805f9b34fb'  // GAN Base Service
      ]
    });

    btDevice.addEventListener('gattserverdisconnected', () => {
      btConnected = false;
      connectedBrand = null;
      btBtn.textContent = '🔗 เชื่อมต่อ Bluetooth Timer';
      btBtn.classList.remove('connected');
      setBtStatus('การเชื่อมต่อหลุดจากอุปกรณ์แล้ว');
    });

    setBtStatus('กำลังเชื่อมต่อเซิร์ฟเวอร์อุปกรณ์...');
    btServer = await btDevice.gatt.connect();

    setBtStatus('กำลังค้นหาบริการและช่องสัญญาณ...');
    
    let targetService = null;
    let targetChar = null;

    // 1. ตรวจสอบเงื่อนไขแรก: ตรวจจับสัญญาณเครื่อง QiYi V2 (จากหน้าจอแอป nRF Connect)
    try {
      targetService = await btServer.getPrimaryService('5833ff01-9b8b-5191-6142-22a4536ef123');
      targetChar = await targetService.getCharacteristic('5833ff03-9b8b-5191-6142-22a4536ef123'); // ดึงค่าช่อง Notify
      connectedBrand = 'QIYI';
      console.log('พบอุปกรณ์ QiYi V2 Smart Timer สำเร็จ!');
    } catch(e) {
      console.log('ไม่ใช่ QiYi V2, กำลังลองตรวจสอบมาตรฐานรุ่นอื่น...');
    }

    // 2. ถ้าไม่ใช่ V2 ให้ทำการตรวจจับอุปกรณ์รูปแบบเดิม (QiYi V1 หรือ GAN)
    if(!targetChar) {
      try {
        if(btDevice.name && (btDevice.name.includes('QIYI') || btDevice.name.includes('QY-'))) {
          targetService = await btServer.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
          targetChar = await targetService.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e');
          connectedBrand = 'QIYI';
        } else {
          targetService = await btServer.getPrimaryService('0000fee7-0000-1000-8000-00805f9b34fb');
          targetChar = await targetService.getCharacteristic('000036f5-0000-1000-8000-00805f9b34fb');
          connectedBrand = 'GAN';
        }
      } catch(e) {
        // 3. Fallback: ในกรณีชิปตัวจับเวลาหลุดมาตรฐาน ให้ไล่สุ่มค้นหาช่อง Notify อัตโนมัติ
        const services = await btServer.getPrimaryServices();
        for(let service of services) {
          try {
            const characteristics = await service.getCharacteristics();
            for(let char of characteristics) {
              if(char.properties.notify) {
                targetService = service;
                targetChar = char;
                connectedBrand = (btDevice.name && (btDevice.name.includes('GAN'))) ? 'GAN' : 'QIYI';
                break;
              }
            }
          } catch(err) { continue; }
          if(targetChar) break;
        }
      }
    }

    if(!targetChar) {
      throw new Error('ไม่พบช่องสัญญาณส่งข้อมูล (Notify) ที่สามารถเปิดรับข้อมูลเวลาได้');
    }

    setBtStatus(`เชื่อมต่อสำเร็จ! กำลังสมัครรับข้อมูลจาก [${targetChar.uuid.slice(0,8)}]...`);
    
    await targetChar.startNotifications();
    targetChar.addEventListener('characteristicvaluechanged', handleTimerDataNotification);

    btConnected = true;
    btBtn.textContent = `✅ เชื่อมต่อแล้ว: ${btDevice.name || connectedBrand + ' Timer'}`;
    btBtn.classList.add('connected');
    setBtStatus(`เชื่อมต่อสำเร็จ (${connectedBrand}) — วางสองมือบนเครื่องจับเวลาเพื่อเริ่มใช้งาน`, 'ok');

  }catch(err){
    console.error(err);
    setBtStatus('เชื่อมต่อไม่สำเร็จ: ' + err.message, 'err');
  }
}

  if(btConnected && btDevice && btDevice.gatt.connected){

});

// ---------- Core Timer Logic ----------
let state = 'idle'; 
let startTime = 0;
let elapsed = 0;
let rafId = null;

let inspectionEnabled = true;
let inspectionInterval = null;
let inspectionLeft = 15;
let pendingPenalty = 0; 

const display = document.getElementById('timerDisplay');
const insToggle = document.getElementById('inspectionToggle');

// โหลดการตั้งค่าเริ่มต้นของอินสเปกชัน
if(localStorage.getItem('wcaInspectionEnabled') !== null){
  inspectionEnabled = localStorage.getItem('wcaInspectionEnabled') === 'true';
  insToggle.checked = inspectionEnabled;
}
insToggle.addEventListener('change', (e) => {
  inspectionEnabled = e.target.checked;
  localStorage.setItem('wcaInspectionEnabled', inspectionEnabled);
});

function formatTime(ms) {
  if (ms === 'DNF') return 'DNF';
  if (ms < 0) return '0.00';
  const totalSecs = ms / 1000;
  if (totalSecs < 60) {
    return totalSecs.toFixed(2);
  }
  const mins = Math.floor(totalSecs / 60);
  const secs = (totalSecs % 60).toFixed(2);
  return `${mins}:${secs.padStart(5, '0')}`;
}

function speakTime(ms, isDnf, penalty) {
  if (!('speechSynthesis' in window)) return;
  if (!document.getElementById('voiceToggle').checked) return;

  window.speechSynthesis.cancel(); 
  let text = '';
  if (isDnf) {
    text = 'ดีเอ็นเอฟ';
  } else {
    let finalMs = ms;
    const totalSec = finalMs / 1000;
    if (totalSec < 60) {
      text = totalSec.toFixed(2) + ' วินาที';
    } else {
      const m = Math.floor(totalSec / 60);
      const s = (totalSec % 60).toFixed(2);
      text = `${m} นาที ${s} วินาที`;
    }
  }
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'th-TH';
  utterance.rate = 1.2; 
  window.speechSynthesis.speak(utterance);
}

function tick() {
  elapsed = Date.now() - startTime;
  display.textContent = formatTime(elapsed);
  rafId = requestAnimationFrame(tick);
}

function startInspection(){
  state = 'inspecting';
  inspectionLeft = 15;
  pendingPenalty = 0;
  display.className = 'inspecting';
  display.textContent = inspectionLeft;
  
  clearInterval(inspectionInterval);
  inspectionInterval = setInterval(() => {
    inspectionLeft--;
    if(inspectionLeft > 7){
      display.className = 'inspecting';
      display.textContent = inspectionLeft;
    } else if(inspectionLeft > 0){
      display.className = 'inspect-warn';
      display.textContent = inspectionLeft;
    } else if(inspectionLeft > -2){
      // เกิน 15 วิ แต่ไม่เกิน 17 วิ ได้ +2 penalty
      display.className = 'inspect-danger';
      display.textContent = '+2';
      pendingPenalty = 2;
    } else {
      // เกิน 17 วิ ถือเป็น DNF
      clearInterval(inspectionInterval);
      display.className = 'inspect-danger';
      display.textContent = 'DNF';
      pendingPenalty = 'DNF';
    }
  }, 1000);
}

function stopInspection(){
  clearInterval(inspectionInterval);
}

function saveTime(ms, isDnf=false, penalty=0){
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess) return;
  curSess.times.unshift({
    id: Date.now(),
    ms: ms,
    dnf: isDnf,
    penalty: penalty, 
    scramble: currentScramble,
    date: new Date().toLocaleString('th-TH')
  });
  saveSessionsToStorage();
  renderHistory();
  renderStats();
  
  // สั่งอ่านเวลาออกเสียงพูดหลังบันทึกเสร็จ
  speakTime(ms, isDnf, penalty);
}

// คีย์บอร์ดและหน้าจอสัมผัส (สเปซบาร์) คอนโทรลเลอร์
let spacePressed = false;
let readyTimeout = null;

window.addEventListener('keydown', (e) => {
  if (e.code !== 'Space') return;
  // บล็อกสเปซบาร์ไม่ให้เลื่อนจอลงล่าง
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
  e.preventDefault();
  
  if (spacePressed) return;
  spacePressed = true;

  if (state === 'running') {
    // กดหยุดเวลา
    cancelAnimationFrame(rafId);
    state = 'idle';
    const finalMs = elapsed + (pendingPenalty === 2 ? 2000 : 0);
    const isDnf = (pendingPenalty === 'DNF');
    saveTime(finalMs, isDnf, pendingPenalty === 2 ? 2 : 0);
    display.classList.remove('go');
    if (isDnf) display.textContent = 'DNF';
    else display.textContent = formatTime(finalMs) + (pendingPenalty === 2 ? ' (+2)' : '');
    newScramble();
  } else if (state === 'idle' || state === 'inspecting') {
    // เตรียมพร้อมสตาร์ท
    display.className = 'ready';
    if (!inspectionEnabled) {
      readyTimeout = setTimeout(() => {
        display.className = 'ready';
      }, 300);
    }
  }
});

window.addEventListener('keyup', (e) => {
  if (e.code !== 'Space') return;
  spacePressed = false;
  clearTimeout(readyTimeout);

  if (state === 'idle' && !inspectionEnabled) {
    // เริ่มจับทันทีถ้าปิดดูลูก
    display.className = 'go';
    state = 'running';
    startTime = Date.now();
    tick();
  } else if (state === 'idle' && inspectionEnabled) {
    // เข้าสู่โหมดดูลูก 15 วินาที
    startInspection();
  } else if (state === 'inspecting') {
    // สตาร์ทจับเวลาจากโหมดดูลูก
    stopInspection();
    if (pendingPenalty === 'DNF') {
      // ปล่อยมือช้าเกิน 17 วิ บันทึก DNF ทันที
      state = 'idle';
      saveTime(0, true, 0);
      newScramble();
    } else {
      display.className = 'go';
      state = 'running';
      startTime = Date.now();
      tick();
    }
  }
});

// รองรับ Touch Event บนมือถือ (กดค้างที่หน้าจอตรงส่วนเลขจับเวลา)
let touchStartTarget = null;
display.addEventListener('touchstart', (e) => {
  if (e.target !== display) return;
  e.preventDefault();
  touchStartTarget = e.target;
  
  if (state === 'running') {
    cancelAnimationFrame(rafId);
    state = 'idle';
    const finalMs = elapsed + (pendingPenalty === 2 ? 2000 : 0);
    const isDnf = (pendingPenalty === 'DNF');
    saveTime(finalMs, isDnf, pendingPenalty === 2 ? 2 : 0);
    display.classList.remove('go');
    if (isDnf) display.textContent = 'DNF';
    else display.textContent = formatTime(finalMs) + (pendingPenalty === 2 ? ' (+2)' : '');
    newScramble();
  } else if (state === 'idle' || state === 'inspecting') {
    display.className = 'ready';
  }
});

display.addEventListener('touchend', (e) => {
  if (e.target !== display) return;
  e.preventDefault();
  
  if (state === 'idle' && !inspectionEnabled) {
    display.className = 'go';
    state = 'running';
    startTime = Date.now();
    tick();
  } else if (state === 'idle' && inspectionEnabled) {
    startInspection();
  } else if (state === 'inspecting') {
    stopInspection();
    if (pendingPenalty === 'DNF') {
      state = 'idle';
      saveTime(0, true, 0);
      newScramble();
    } else {
      display.className = 'go';
      state = 'running';
      startTime = Date.now();
      tick();
    }
  }
});


// ---------- History Render & Manual Adjustments ----------
const historyList = document.getElementById('historyList');
const penaltyLastBtn = document.getElementById('penaltyLastBtn');
const dnfLastBtn = document.getElementById('dnfLastBtn');

function renderHistory(){
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess || curSess.times.length === 0){
    historyList.innerHTML = '<div class="empty">ยังไม่มีข้อมูลเวลาในเซสชันนี้</div>';
    penaltyLastBtn.disabled = true;
    dnfLastBtn.disabled = true;
    return;
  }
  
  penaltyLastBtn.disabled = false;
  dnfLastBtn.disabled = false;
  
  // อัปเดตสถานะปุ่มด่วนชิ้นล่าสุด
  const lastTime = curSess.times[0];
  if(lastTime.penalty === 2){
    penaltyLastBtn.textContent = '⚠️ คืนค่าเดิม (จาก +2)';
    penaltyLastBtn.style.background = 'var(--accent2)';
    penaltyLastBtn.style.color = '#111';
  } else {
    penaltyLastBtn.textContent = '⚠️ +2 (เวลาล่าสุด)';
    penaltyLastBtn.style.background = 'var(--panel)';
    penaltyLastBtn.style.color = 'var(--text)';
  }
  
  if(lastTime.dnf){
    dnfLastBtn.textContent = '❌ คืนค่าเดิม (จาก DNF)';
    dnfLastBtn.style.background = 'var(--danger)';
    dnfLastBtn.style.color = '#111';
  } else {
    dnfLastBtn.textContent = '❌ DNF (เวลาล่าสุด)';
    dnfLastBtn.style.background = 'var(--panel)';
    dnfLastBtn.style.color = 'var(--text)';
  }

  // หาเวลาที่ดีที่สุดเพื่อไฮไลท์
  let bestMs = Infinity;
  curSess.times.forEach(t => {
    if(!t.dnf && t.ms < bestMs) bestMs = t.ms;
  });

  historyList.innerHTML = '';
  curSess.times.forEach((t, index) => {
    const displayIdx = curSess.times.length - index;
    const isBest = (!t.dnf && t.ms === bestMs);
    
    let timeText = formatTime(t.ms);
    if(t.dnf) timeText = 'DNF';
    else if(t.penalty === 2) timeText += ' (+2)';

    const row = document.createElement('div');
    row.className = 'time-row' + (isBest ? ' best-time' : '');
    
    row.innerHTML = `
      <div class="row-main">
        <div>
          <span class="idx">#${displayIdx}</span>
          ${isBest ? '<span class="best-star">⭐</span>' : ''}
          <span class="val">${timeText}</span>
        </div>
        <div class="row-actions">
          <span class="pen-btn ${t.penalty===2?'active':''}" onclick="event.stopPropagation(); togglePenalty(${index})">+2</span>
          <span class="dnf-btn ${t.dnf?'active':''}" onclick="event.stopPropagation(); toggleDnf(${index})">DNF</span>
          <span class="del" onclick="event.stopPropagation(); deleteTime(${index})">🗑️</span>
        </div>
      </div>
      <div class="row-scramble">🧩 Scramble: ${t.scramble || '-'} (${t.date || ''})</div>
    `;
    
    row.addEventListener('click', () => {
      row.classList.toggle('expanded');
    });
    
    historyList.appendChild(row);
  });
}

function deleteTime(index){
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess) return;
  if(confirm("ลบเวลาแถวนี้ใช่หรือไม่?")){
    curSess.times.splice(index, 1);
    saveSessionsToStorage();
    renderHistory();
    renderStats();
  }
}

function togglePenalty(index){
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess || !curSess.times[index]) return;
  const item = curSess.times[index];
  
  if(item.dnf) return; // DNF อยู่ห้ามกด +2
  
  if(item.penalty === 2){
    item.penalty = 0;
    item.ms -= 2000;
  } else {
    item.penalty = 2;
    item.ms += 2000;
  }
  saveSessionsToStorage();
  renderHistory();
  renderStats();
}

function toggleDnf(index){
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess || !curSess.times[index]) return;
  const item = curSess.times[index];
  
  if(item.dnf){
    item.dnf = false;
  } else {
    // ถ้าเคยได้ +2 ให้คืนค่าเวลาก่อนทำ DNF เพื่อความแม่นยำของข้อมูลดิบ
    if(item.penalty === 2){
      item.penalty = 0;
      item.ms -= 2000;
    }
    item.dnf = true;
  }
  saveSessionsToStorage();
  renderHistory();
  renderStats();
}

document.getElementById('clearBtn').addEventListener('click', () => {
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess || curSess.times.length === 0) return;
  if(confirm("ล้างสถิติเวลาทั้งหมดในเซสชันนี้? ไม่สามารถย้อนกลับได้!")){
    curSess.times = [];
    saveSessionsToStorage();
    renderHistory();
    renderStats();
  }
});


// ---------- Statistics Calculations & Chart Integration ----------
let timeChart = null;

function calcAoN(arr, n) {
  if (arr.length < n) return '-';
  const lastN = arr.slice(0, n);
  
  let dnfCount = 0;
  let subArr = [];
  
  lastN.forEach(t => {
    if (t.dnf) dnfCount++;
    else subArr.push(t.ms);
  });
  
  if (dnfCount > 1) return 'DNF'; 
  
  // เรียงลำดับค่าน้อยไปมาก
  subArr.sort((a, b) => a - b);
  
  if (dnfCount === 1) {
    // ตัดค่าน้อยที่สุดออก 1 ตัว ค่ามากที่สุดคือตัวที่เป็น DNF ซึ่งแยกไปแล้ว
    subArr.shift(); 
  } else {
    // ตัดทั้งค่าน้อยสุดและมากสุดออกอย่างละหนึ่งตัว
    subArr.shift();
    subArr.pop();
  }
  
  const sum = subArr.reduce((acc, v) => acc + v, 0);
  return formatTime(sum / subArr.length);
}

function renderStats(){
  const curSess = sessionsData.sessions[sessionsData.currentId];
  const bestBox = document.getElementById('statBest');
  const ao5Box = document.getElementById('statAo5');
  const ao12Box = document.getElementById('statAo12');
  const meanBox = document.getElementById('statMean');
  
  if(!curSess || curSess.times.length === 0){
    bestBox.textContent = '-';
    ao5Box.textContent = '-';
    ao12Box.textContent = '-';
    meanBox.textContent = '-';
    document.getElementById('chartContainer').style.display = 'none';
    return;
  }
  
  const times = curSess.times; // ล่าสุดอยู่อันแรก
  
  // คำนวณหาค่า Best
  let best = Infinity;
  times.forEach(t => { if(!t.dnf && t.ms < best) best = t.ms; });
  bestBox.textContent = best === Infinity ? 'DNF' : formatTime(best);
  
  // คำนวณหาค่า Ao5 และ Ao12
  ao5Box.textContent = calcAoN(times, 5);
  ao12Box.textContent = calcAoN(times, 12);
  
  // คำนวณหาค่าเฉลี่ยสุทธิ (Mean)
  let validCount = 0;
  let totalSum = 0;
  times.forEach(t => {
    if(!t.dnf){
      validCount++;
      totalSum += t.ms;
    }
  });
  meanBox.textContent = validCount > 0 ? formatTime(totalSum / validCount) : 'DNF';
  
  // วาดกราฟสถิติเมื่อมีข้อมูลตั้งแต่ 2 ครั้งขึ้นไป
  if(times.length >= 2){
    document.getElementById('chartContainer').style.display = 'block';
    updateChart();
  } else {
    document.getElementById('chartContainer').style.display = 'none';
  }
}

function updateChart(){
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess) return;
  
  // ดึงข้อมูลเรียงย้อนจากอดีตมาปัจจุบัน (ย้อนศรอาเรย์เดิม)
  const chartData = curSess.times.slice().reverse();
  const labels = chartData.map((_, i) => i + 1);
  const dataVals = chartData.map(t => t.dnf ? null : (t.ms / 1000));
  
  // ตรวจจับโทนสีคู่สีตามสถานะธีมปัจจุบัน
  const isLight = document.body.classList.contains('theme-light');
  const textColor = isLight ? '#1c1c1e' : '#e9e8ff';
  const gridColor = isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)';
  
  const ctx = document.getElementById('timeChart').getContext('2d');
  
  if(timeChart){
    timeChart.data.labels = labels;
    timeChart.data.datasets[0].data = dataVals;
    timeChart.options.scales.x.ticks.color = textColor;
    timeChart.options.scales.y.ticks.color = textColor;
    timeChart.options.scales.x.grid.color = gridColor;
    timeChart.options.scales.y.grid.color = gridColor;
    timeChart.update();
  } else {
    timeChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: 'เวลา (วินาที)',
          data: dataVals,
          borderColor: '#00e5ff',
          backgroundColor: 'rgba(0, 229, 255, 0.15)',
          borderWidth: 2.5,
          pointRadius: 3.5,
          pointBackgroundColor: '#ffc857',
          tension: 0.15,
          spanGaps: true // ถ้าเจอ DNF (null) ให้ข้ามจุดไปวาดเส้นต่อ
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } },
          y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 10 } } }
        }
      }
    });
  }
}


// ---------- Import / Export Data Operations ----------
document.getElementById('exportBtn').addEventListener('click', () => {
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(!curSess || curSess.times.length === 0){
    alert("ไม่มีข้อมูลสำหรับส่งออก");
    return;
  }
  let csv = "ลำดับ,เวลาจับได้,สถานะพิเศษ,สแครมเบิล (Scramble),วันเวลาที่บันทึก\n";
  curSess.times.forEach((t, i) => {
    const idx = curSess.times.length - i;
    let note = "ปกติ";
    if(t.dnf) note = "DNF";
    else if(t.penalty === 2) note = "+2 Penalty";
    
    let rawSec = t.dnf ? "DNF" : (t.ms/1000).toFixed(2);
    csv += `${idx},${rawSec},${note},"${t.scramble || ''}",${t.date || ''}\n`;
  });
  
  const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${curSess.name.replace(/\s+/g, '_')}_times.csv`;
  a.click();
});

document.getElementById('exportJsonBtn').addEventListener('click', () => {
  const jsonStr = JSON.stringify(sessionsData, null, 2);
  const blob = new Blob([jsonStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rubik_timer_backup_${Date.now()}.json`;
  a.click();
});

document.getElementById('importBtn').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try{
        const parsed = JSON.parse(evt.target.result);
        if(parsed.sessions && parsed.currentId){
          if(confirm("พบข้อมูลระบบเซสชันสำรอง ต้องการนำเข้าข้อมูลมาทับของเดิมบนเครื่องนี้ทันทีหรือไม่?")){
            sessionsData = parsed;
            saveSessionsToStorage();
            populateSessionSelect();
            syncCubeTypeSelect();
            newScramble();
            renderHistory();
            renderStats();
            alert("นำเข้าข้อมูลสำเร็จแล้ว!");
          }
        } else {
          alert("โครงสร้างไฟล์ JSON ตัวช่วยสำรองไม่ถูกต้อง");
        }
      }catch(err){
        alert("ไม่สามารถอ่านไฟล์ได้: " + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
});


// ---------- Theme Configuration & Settings ----------
const themeSelect = document.getElementById('themeSelect');

function setTheme(themeName){
  document.body.classList.remove('theme-space', 'theme-amoled', 'theme-light', 'theme-cyberpunk');
  if(themeName !== 'space'){
    document.body.classList.add('theme-' + themeName);
  }
  localStorage.setItem('rubikTimerTheme', themeName);
  
  // รีเฟรชกราฟด้วยเมื่อสีธีมเปลี่ยนไป
  const curSess = sessionsData.sessions[sessionsData.currentId];
  if(curSess && curSess.times.length >= 2){
    updateChart();
  }
}

themeSelect.addEventListener('change', (e) => {
  setTheme(e.target.value);
});

function loadUserPreferences(){
  const savedTheme = localStorage.getItem('rubikTimerTheme') || 'space';
  themeSelect.value = savedTheme;
  setTheme(savedTheme);

  const savedVoice = localStorage.getItem('rubikTimerVoice');
  if(savedVoice !== null){
    voiceToggle.checked = savedVoice === 'true';
  } else {
    voiceToggle.checked = true; // เปิดค่าเริ่มต้นเป็นเปิดใช้งานระบบอ่านออกเสียง
  }
}

document.getElementById('voiceToggle').addEventListener('change', (e) => {
  localStorage.setItem('rubikTimerVoice', e.target.checked);
});


// ---------- Init Run Block ----------
loadSessions();
populateSessionSelect();
syncCubeTypeSelect();
loadUserPreferences(); 
renderHistory();
renderStats();
newScramble();


// ---------- PWA Implementation Setup ----------
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if(!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if(newWorker.state === 'activated'){
            console.log('Cube Timer: ระบบแคชไฟล์ออฟไลน์อัปเดตเวอร์ชันใหม่แล้ว');
          }
        });
      });
    }).catch(err => {
      console.log('ServiceWorker registration failed: ', err);
    });
  });
}
</script>
